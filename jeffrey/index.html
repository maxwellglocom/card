<title>Jeffrey Wee — Maxwell Glocom Pte. Ltd.</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,#1F3864 0%,#16294a 100%);
    min-height:100vh; display:flex; justify-content:center; align-items:flex-start;
    padding:24px 16px;
  }
  .card {
    background:#ffffff; width:100%; max-width:420px; border-radius:24px;
    overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,0.35);
  }
  .header {
    background:linear-gradient(160deg,#CC0000 0%,#9e0000 100%);
    padding:28px 24px 40px; text-align:center; position:relative;
  }
  .logo-wrap {
    width:130px; height:130px; margin:0 auto;
    background:#fff; border-radius:50%; padding:8px;
    box-shadow:0 8px 24px rgba(0,0,0,0.25);
  }
  .logo-wrap img { width:100%; height:100%; border-radius:50%; object-fit:cover; }
  .body { padding:0 24px 28px; margin-top:-20px; text-align:center; }
  .name { font-size:26px; font-weight:700; color:#1F3864; margin-top:24px; }
  .title { font-size:15px; color:#CC0000; font-weight:600; margin-top:4px; }
  .company { font-size:16px; color:#333; font-weight:600; margin-top:14px; }
  .uen { font-size:12px; color:#888; margin-top:2px; letter-spacing:0.5px; }
  .address { font-size:13px; color:#666; margin-top:10px; line-height:1.5; }
  .divider { height:1px; background:#eee; margin:22px 0; }
  .btn {
    display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%; padding:15px; border-radius:14px; border:none;
    font-size:16px; font-weight:600; cursor:pointer; margin-bottom:12px;
    text-decoration:none; transition:transform .12s ease, opacity .12s ease;
  }
  .btn:active { transform:scale(0.98); opacity:0.9; }
  .btn svg { width:20px; height:20px; flex-shrink:0; }
  .btn-primary { background:#1F3864; color:#fff; }
  .btn-wa { background:#25D366; color:#fff; }
  .btn-outline { background:#fff; color:#1F3864; border:1.5px solid #d5d9e0; }
  .footer { text-align:center; font-size:11px; color:#aaa; padding:4px 0 18px; }
</style>
